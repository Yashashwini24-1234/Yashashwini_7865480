<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Grid Exercises</title>
    <style>
        h1 {
            text-align: center;
            font-family: Arial, sans-serif;
            font-size: 40px;
            color: #2c3e50;
            margin-top: 30px;
        }
    </style>
    <h1>Grid Exercises</h1>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="css/custom.css">
</head>

<body>

<div class="container mt-5">

    <div class="row">

        <div class="col-12 col-md-6 col-lg-4 bg-primary text-white p-3">
            Column 1
        </div>

        <div class="col-12 col-md-6 col-lg-4 bg-success text-white p-3">
            Column 2
        </div>

        <div class="col-12 col-md-12 col-lg-4 bg-danger text-white p-3">
            Column 3
        </div>

    </div>

</div>

<div class="container mt-5">

    <div class="row">

        <div class="col-md-3 bg-dark text-white p-3">
            Sidebar
        </div>

        <div class="col-md-9 bg-light p-3">
            Content Area
        </div>

    </div>

</div>

<div class="container mt-5">

    <div class="row">

        <div class="col-sm-3 bg-primary text-white p-3">1</div>

        <div class="col-sm-3 bg-success text-white p-3">2</div>

        <div class="col-sm-3 bg-warning p-3">3</div>

        <div class="col-sm-3 bg-danger text-white p-3">4</div>

    </div>

</div>

<div class="container mt-5">

    <div class="row justify-content-center align-items-center"
    style="height:200px;">

        <div class="col-4 bg-info text-center p-3">
            Centered Box
        </div>

    </div>

</div>

<div class="container mt-5">

    <div class="row">

        <div class="col-md-6 order-md-2 bg-primary text-white p-3">
            First
        </div>

        <div class="col-md-6 order-md-1 bg-success text-white p-3">
            Second
        </div>

    </div>

</div>

<script src="js/bootstrap.bundle.min.js"></script>

</body>
</html>
