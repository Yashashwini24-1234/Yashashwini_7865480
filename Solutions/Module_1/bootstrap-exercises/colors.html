<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Colors & Backgrounds</title>

    <link rel="stylesheet" href="css/custom.css">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-center text-primary mb-5">
        Colors & Backgrounds
    </h1>

    <div class="row g-4">

        <!-- Primary -->
        <div class="col-md-4">

            <div class="bg-primary text-white p-4 rounded shadow">

                <h4>Primary Section</h4>

                <p>
                    Bootstrap primary background example.
                </p>

            </div>

        </div>

        <!-- Warning -->
        <div class="col-md-4">

            <div class="bg-warning p-4 rounded shadow">

                <h4>Warning Section</h4>

                <p>
                    Bootstrap warning background example.
                </p>

            </div>

        </div>

        <!-- Success -->
        <div class="col-md-4">

            <div class="bg-success text-white p-4 rounded shadow">

                <h4>Success Section</h4>

                <p>
                    Bootstrap success background example.
                </p>

            </div>

        </div>

    </div>

    <!-- Gradient Background -->

    <div class="bg-dark bg-gradient text-white
    p-5 rounded shadow-lg mt-5 text-center">

        <h2>
            Gradient Background
        </h2>

        <p class="mt-3">
            Bootstrap gradient utility with dark background.
        </p>

    </div>

</div>

<script src="js/bootstrap.bundle.min.js"></script>

</body>
</html>
