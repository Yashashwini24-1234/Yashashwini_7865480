<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Borders and Shadows</title>

    <link rel="stylesheet" href="css/custom.css">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-center text-primary mb-5">
        Borders, Shadows & Rounded Corners
    </h1>

    <div class="row justify-content-center">

        <div class="col-md-6 text-center">

            <!-- Rounded Image -->
            <img src="images/event2.jpg"

            class="border border-primary border-3
            rounded-circle shadow mb-4"

            alt="Profile Image">

            <!-- Shadow Card -->
            <div class="card shadow-lg rounded-4 p-4">

                <h3 class="text-primary">
                    Shadow Card
                </h3>

                <p class="mt-3">
                    This card demonstrates Bootstrap border,
                    shadow, and rounded utilities.
                </p>

                <button class="btn btn-primary">
                    Learn More
                </button>

            </div>

        </div>

    </div>

</div>

<script src="js/bootstrap.bundle.min.js"></script>

</body>
</html>
