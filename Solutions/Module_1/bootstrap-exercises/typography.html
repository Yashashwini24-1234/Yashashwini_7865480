<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Bootstrap Typography</title>

    <link rel="stylesheet" href="css/custom.css">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-center text-primary mb-5">
        Bootstrap Typography Utilities
    </h1>

    <!-- Display Heading -->

    <div class="card shadow-lg p-5 mb-5">

        <h1 class="display-1 text-primary">
            Display Heading
        </h1>

        <p class="lead mt-4">
            This is a lead paragraph using Bootstrap
            typography utilities.
        </p>

        <p class="text-muted">
            This is muted text.
        </p>

        <p class="fw-bold">
            This text is bold.
        </p>

    </div>

    <!-- Text Transformations -->

    <div class="card shadow p-5">

        <h2 class="mb-4 text-success">
            Text Transform Utilities
        </h2>

        <p class="text-uppercase fs-4">
            uppercase text example
        </p>

        <p class="text-lowercase fs-4">
            LOWERCASE TEXT EXAMPLE
        </p>

        <p class="text-capitalize fs-4">
            bootstrap typography utilities
        </p>

    </div>

</div>

<script src="js/bootstrap.bundle.min.js"></script>

</body>
</html>
