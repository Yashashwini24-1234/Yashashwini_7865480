<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Spacing Utilities</title>

    <link rel="stylesheet" href="css/custom.css">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-center text-primary mb-5">
        Bootstrap Spacing Utilities
    </h1>

    <!-- Margin & Padding Example -->

    <div class="bg-white shadow rounded
    p-4 mb-5">

        <h2 class="m-3 text-primary">
            Margin & Padding Utilities
        </h2>

        <p class="mt-4">
            This section demonstrates Bootstrap spacing
            classes like m-3, mt-4, p-2, and py-5.
        </p>

    </div>

</div>

<!-- Pricing Section -->

<div class="container py-5">

    <div class="row g-4 justify-content-center">

        <!-- Basic Plan -->

        <div class="col-md-4">

            <div class="card shadow-lg p-4 text-center h-100">

                <h3 class="text-primary">
                    Basic
                </h3>

                <h1 class="my-4">
                    $10
                </h1>

                <p class="mb-4">
                    Suitable for beginners.
                </p>

                <button class="btn btn-primary w-100">
                    Buy Now
                </button>

            </div>

        </div>

        <!-- Standard Plan -->

        <div class="col-md-4">

            <div class="card shadow-lg p-4 text-center h-100">

                <h3 class="text-success">
                    Standard
                </h3>

                <h1 class="my-4">
                    $25
                </h1>

                <p class="mb-4">
                    Perfect for regular users.
                </p>

                <button class="btn btn-success w-100">
                    Buy Now
                </button>

            </div>

        </div>

        <!-- Premium Plan -->

        <div class="col-md-4">

            <div class="card shadow-lg p-4 text-center h-100">

                <h3 class="text-danger">
                    Premium
                </h3>

                <h1 class="my-4">
                    $50
                </h1>

                <p class="mb-4">
                    Best for professionals.
                </p>

                <button class="btn btn-danger w-100">
                    Buy Now
                </button>

            </div>

        </div>

    </div>

</div>

<script src="js/bootstrap.bundle.min.js"></script>

</body>
</html>
