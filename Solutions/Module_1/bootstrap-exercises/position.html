<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Position Utilities</title>

    <link rel="stylesheet" href="css/custom.css">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-center text-primary mb-5">
        Bootstrap Position Utilities
    </h1>

    <!-- Image Badge Section -->

    <div class="row justify-content-center">

        <div class="col-md-4 text-center">

            <div class="position-relative d-inline-block">

                <img src="images/event3.jpg"

                class="img-fluid rounded shadow"

                alt="Product Image">

                <!-- Badge -->

                <span class="position-absolute
                top-0 start-100
                translate-middle
                badge rounded-pill bg-danger p-3">

                    New

                </span>

            </div>

        </div>

    </div>

</div>

<!-- Content Area -->

<div class="container mt-5 mb-5">

    <div class="card shadow-lg p-4">

        <h3 class="text-primary">
            Fixed Footer Example
        </h3>

        <p>
            This page demonstrates Bootstrap positioning
            utilities using relative, absolute, and fixed positions.
        </p>

        <p>
            The footer stays fixed at the bottom of the screen.
        </p>

    </div>

</div>

<!-- Fixed Footer -->

<footer class="bg-dark text-white
text-center p-3
position-fixed bottom-0 w-100 shadow">

    © 2026 Bootstrap Position Utilities

</footer>

<script src="js/bootstrap.bundle.min.js"></script>

</body>
</html>
